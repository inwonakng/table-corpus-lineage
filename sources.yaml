relations:
  - from: WikiTables_2019
    to: Wikipedia
    type: uses_source
    note: >
      A 2019 crawl of English Wikipedia, extracting 714,632 tables from
      Wikipedia pages (described in Bleifuß et al. 2021, SEA-Data @ VLDB 2021).

  - from: WikiTables
    to: Wikipedia
    type: uses_source
    note: >
      WikiTables parses the English Wikipedia XML dump, extracting tables
      enclosed in Wiki Markup {| … |} tags (plus template-rendered tables),
      then filters to HTML class="wikitable" only to exclude infoboxes, TOC,
      and metadata boxes; yields ~1.4M data tables across ~643K pages.
